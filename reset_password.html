<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>새 비밀번호 설정</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>
<script src="toast.js"></script>
<script src="auth.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard','Noto Sans KR',sans-serif;
}
body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    overflow-x:hidden;
    background:#f2f4f8;
}
.reset-box{
    width:100%;
    max-width:420px;
    padding:35px 25px;
    border-radius:18px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    opacity:0;
    transform:translateY(28px) scale(.96);
    filter:blur(7px);
    animation:resetPageEnter 560ms cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes resetPageEnter{
    to{
        opacity:1;
        transform:translateY(0) scale(1);
        filter:blur(0);
    }
}
.title{
    margin-bottom:10px;
    text-align:center;
    font-size:27px;
    font-weight:800;
}
.description{
    margin-bottom:24px;
    text-align:center;
    color:#6b7280;
    font-size:13px;
    line-height:1.6;
}
.input{
    width:100%;
    height:54px;
    margin-bottom:15px;
    padding:0 16px;
    border:1px solid #d9d9d9;
    border-radius:10px;
    outline:none;
    font-size:16px;
}
.input:focus{
    border-color:#2E5E4E;
}
.guide{
    margin-top:-8px;
    margin-bottom:14px;
    color:#2B7CFF;
    font-size:12px;
}
.submit-btn{
    width:100%;
    height:54px;
    margin-top:4px;
    border:0;
    border-radius:10px;
    background:#2E5E4E;
    color:white;
    font-size:17px;
    font-weight:800;
    cursor:pointer;
}
.submit-btn:disabled{
    opacity:.45;
    cursor:not-allowed;
}
.back{
    margin-top:20px;
    text-align:center;
}
.back a{
    color:#2E5E4E;
    text-decoration:none;
    font-size:14px;
    font-weight:700;
}
.status{
    display:none;
    margin-bottom:18px;
    padding:13px;
    border-radius:12px;
    background:#fff7ed;
    color:#c2410c;
    text-align:center;
    font-size:13px;
    font-weight:700;
    line-height:1.5;
}
.status.visible{
    display:block;
}
@media(prefers-reduced-motion:reduce){
    .reset-box{animation-duration:1ms!important;}
}
</style>
</head>

<body>
<div class="reset-box">
    <div class="title">새 비밀번호 설정</div>
    <p class="description">
        새로운 비밀번호를 입력해주세요.<br>
        설정이 완료되면 로그인 화면으로 이동합니다.
    </p>

    <div id="recovery-status" class="status">
        비밀번호 재설정 링크를 확인하고 있습니다.
    </div>

    <input id="new-password" type="password" class="input" placeholder="새 비밀번호" autocomplete="new-password">
    <div class="guide">*8~15글자, 숫자 포함</div>

    <input id="new-password-confirm" type="password" class="input" placeholder="새 비밀번호 확인" autocomplete="new-password">

    <button id="update-password-btn" class="submit-btn" disabled>비밀번호 변경</button>

    <div class="back">
        <a href="index.html">← 로그인으로</a>
    </div>
</div>

<script>
const newPassword=document.getElementById("new-password");
const newPasswordConfirm=document.getElementById("new-password-confirm");
const updatePasswordBtn=document.getElementById("update-password-btn");
const recoveryStatus=document.getElementById("recovery-status");

const passwordRegex=/^(?=.*\d).{8,15}$/;
let recoveryReady=false;
let updating=false;

function setRecoveryState(ready,message=""){
    recoveryReady=ready;
    updatePasswordBtn.disabled=!ready;

    if(message){
        recoveryStatus.textContent=message;
        recoveryStatus.classList.add("visible");
    }else{
        recoveryStatus.classList.remove("visible");
    }
}

async function prepareRecoverySession(){
    setRecoveryState(false,"비밀번호 재설정 링크를 확인하고 있습니다.");

    const url=new URL(window.location.href);
    const code=url.searchParams.get("code");

    if(code){
        const {error}=await sb.auth.exchangeCodeForSession(code);

        if(error){
            console.error(error);
            setRecoveryState(
                false,
                "재설정 링크가 만료되었거나 올바르지 않습니다.\n로그인 화면에서 다시 요청해주세요."
            );
            return;
        }

        history.replaceState({},document.title,url.pathname);
    }

    const {data:{session},error}=await sb.auth.getSession();

    if(error){
        console.error(error);
    }

    if(session?.user){
        setRecoveryState(true,"");
        newPassword.focus();
        return;
    }

    setTimeout(async()=>{
        const {data:{session:delayedSession}}=await sb.auth.getSession();

        if(delayedSession?.user){
            setRecoveryState(true,"");
            newPassword.focus();
        }else{
            setRecoveryState(
                false,
                "재설정 링크가 만료되었거나 올바르지 않습니다.\n로그인 화면에서 다시 요청해주세요."
            );
        }
    },700);
}

sb.auth.onAuthStateChange((event,session)=>{
    if(event==="PASSWORD_RECOVERY" && session?.user){
        setRecoveryState(true,"");
        setTimeout(()=>newPassword.focus(),80);
    }
});

updatePasswordBtn.addEventListener("click",async()=>{
    if(!recoveryReady || updating) return;

    const password=newPassword.value;
    const confirmation=newPasswordConfirm.value;

    if(!passwordRegex.test(password)){
        triggerToast("비밀번호는 8~15글자이며\n숫자를 포함해야 합니다.");
        newPassword.focus();
        return;
    }

    if(password!==confirmation){
        triggerToast("비밀번호가 일치하지 않습니다.");
        newPasswordConfirm.focus();
        return;
    }

    updating=true;
    updatePasswordBtn.disabled=true;
    updatePasswordBtn.textContent="변경 중...";

    try{
        const {error}=await updatePassword(password);

        if(error){
            console.error(error);
            triggerToast("비밀번호 변경에 실패했습니다.\n재설정 링크를 다시 요청해주세요.");
            return;
        }

        await sb.auth.signOut();

        triggerToast("비밀번호가 변경되었습니다.\n새 비밀번호로 로그인해주세요.");

        setTimeout(()=>{
            sessionStorage.setItem("loginIntroPlayed","1");
            location.replace("index.html");
        },1200);
    }finally{
        updating=false;
        updatePasswordBtn.textContent="비밀번호 변경";

        if(recoveryReady){
            updatePasswordBtn.disabled=false;
        }
    }
});

[newPassword,newPasswordConfirm].forEach(input=>{
    input.addEventListener("keydown",event=>{
        if(event.key==="Enter"){
            updatePasswordBtn.click();
        }
    });
});

window.addEventListener("DOMContentLoaded",prepareRecoverySession);
</script>
</body>
</html>
